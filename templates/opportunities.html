<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunities - Arbitrage Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-lightning-fill text-warning"></i> Arbitrage Bot
            </span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row mt-4">
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="/">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/opportunities">
                                <i class="bi bi-search"></i> Opportunities
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/trades">
                                <i class="bi bi-arrow-left-right"></i> Trades
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/wallet">
                                <i class="bi bi-wallet2"></i> Wallet
                            </a>
                        </li>
                        <li class="nav-item mt-3">
                            <button id="scan-btn" class="btn btn-sm btn-primary w-100">
                                <i class="bi bi-arrow-clockwise"></i> Scan Now
                            </button>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="d-flex justify-content-between align-items-center my-4">
                    <h1>All Opportunities</h1>
                    <button id="refresh-btn" class="btn btn-outline-primary">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div id="opportunities-container" class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Pair</th>
                                        <th>Buy Exchange</th>
                                        <th>Buy Price</th>
                                        <th>Sell Exchange</th>
                                        <th>Sell Price</th>
                                        <th>Price Diff %</th>
                                        <th>Profit After Fees %</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="opps-table">
                                    <tr>
                                        <td colspan="9" class="text-center text-muted py-3">
                                            <i class="bi bi-hourglass-split"></i> Loading...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/opportunities.js') }}"></script>
</body>
</html>
