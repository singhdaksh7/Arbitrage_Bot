<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Arbitrage Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-lightning-fill text-warning"></i> Arbitrage Bot
            </span>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row mt-4">
            <nav class="col-md-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="/">
                                <i class="bi bi-speedometer2"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/opportunities">
                                <i class="bi bi-search"></i> Opportunities
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/trades">
                                <i class="bi bi-arrow-left-right"></i> Trades
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="/wallet">
                                <i class="bi bi-wallet2"></i> Wallet
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 ms-sm-auto px-md-4">
                <div class="my-4">
                    <h1>Wallet</h1>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">USD Balance</h5>
                                <h2 class="text-primary">$<span id="usd-balance">1,000.00</span></h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h5 class="card-title">Portfolio Value</h5>
                                <h2 class="text-info">$<span id="total-value">1,000.00</span></h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-4 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-muted">Total Invested</h6>
                                <h3>$<span id="total-invested">0.00</span></h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-muted">Profit/Loss</h6>
                                <h3 id="total-pnl" class="text-success">$0.00</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-muted">ROI %</h6>
                                <h3 id="roi-percent" class="text-info">0.00%</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Actions</h5>
                    </div>
                    <div class="card-body">
                        <button id="reset-btn" class="btn btn-danger">
                            <i class="bi bi-arrow-counterclockwise"></i> Reset Wallet
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/wallet.js') }}"></script>
</body>
</html>
